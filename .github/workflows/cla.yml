# CLA gate — every external PR needs a one-time signature of CLA.md.
# Self-contained (contributor-assistant action + GITHUB_TOKEN): signatures are
# committed to the `cla-signatures` branch of THIS repo, no external service.
# Contributors sign by commenting the sentence below on their PR; the check
# then flips green for all their future PRs.
name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      # Pinned to the commit behind v2.6.1: this workflow holds contents +
      # pull-requests + statuses write, and a mutable tag would hand those
      # permissions to whatever the tag points at tomorrow.
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/sebderhy/shellteam/blob/main/CLA.md'
          branch: 'cla-signatures'
          # Exact logins only — NO wildcards. checkAllowList.ts matches a
          # pattern containing '*' as an UNANCHORED regex against
          # `committer.login || committer.name`: for any author without a
          # linked GitHub account that falls back to the git author name, which
          # the author chooses. So 'Claude *' would let anyone past this gate
          # with `git config user.name "Claude anything"` and an unlinked
          # email — the substring match doesn't even require the name to start
          # with it. 'Claude *' was also never load-bearing: the action's
          # GraphQL query reads only commit.author and commit.committer, never
          # Co-Authored-By trailers.
          #
          # ShellTeam's own agent-harness identity ("employee (teammate)") must
          # therefore commit as a GitHub-linked author (agent attribution goes
          # in a Co-Authored-By trailer, which this gate ignores) rather than
          # be allowlisted by name.
          allowlist: 'sebderhy,dependabot[bot]'
