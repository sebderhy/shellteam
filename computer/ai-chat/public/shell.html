<!DOCTYPE html>
<!-- Standalone shell console — a plain bash terminal in this cockpit's
     environment (one pty per page, killed on close). Framed by the guest
     shell's Terminal tab; auth is inherited from the cockpit gate upstream.
     Same xterm build + theme as Console Mode (terminal.js). -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal</title>
  <link rel="stylesheet" href="vendor/xterm-5.5.0.min.css" />
  <style>
    html, body { height: 100%; margin: 0; background: #0a0a0a; }
    #term { height: 100%; padding: 8px 0 8px 8px; box-sizing: border-box; }
    .xterm .xterm-viewport { background: #0a0a0a; }
    #status {
      position: fixed; inset: auto 12px 12px auto; z-index: 10;
      font: 12px 'SF Mono', 'Menlo', monospace; color: #737373;
      background: #171717; border: 1px solid #262626; border-radius: 6px;
      padding: 4px 10px; display: none;
    }
  </style>
</head>
<body>
  <div id="term"></div>
  <div id="status"></div>
  <script src="vendor/xterm-5.5.0.min.js"></script>
  <script src="vendor/xterm-addon-fit-0.10.0.min.js"></script>
  <script src="vendor/xterm-addon-web-links-0.11.0.min.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: 'bar',
      fontFamily: "'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo', monospace",
      fontSize: 14,
      lineHeight: 1.3,
      theme: {
        background: '#0a0a0a', foreground: '#f5f5f5',
        cursor: '#f59e0b', cursorAccent: '#0a0a0a',
        selectionBackground: 'rgba(245, 158, 11, 0.3)',
        black: '#0a0a0a', brightBlack: '#737373',
        white: '#f5f5f5', brightWhite: '#ffffff',
        yellow: '#f59e0b', brightYellow: '#fbbf24',
        green: '#22c55e', brightGreen: '#4ade80',
        red: '#ef4444', brightRed: '#f87171',
        blue: '#3b82f6', brightBlue: '#60a5fa',
        cyan: '#06b6d4', brightCyan: '#22d3ee',
        magenta: '#a855f7', brightMagenta: '#c084fc',
      },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
    term.open(document.getElementById('term'));
    fit.fit();
    term.focus();

    const status = document.getElementById('status');
    function showStatus(text) { status.textContent = text; status.style.display = 'block'; }

    const ws = new WebSocket(`ws${location.protocol === 'https:' ? 's' : ''}://${location.host}/ws/shell`);
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'terminal_resize', cols: term.cols, rows: term.rows }));
    };
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'terminal_data') term.write(msg.data);
      else if (msg.type === 'terminal_exit') showStatus('session ended — reload to start a new shell');
      else if (msg.type === 'terminal_error') showStatus(msg.error);
    };
    ws.onclose = () => showStatus('disconnected — reload to start a new shell');

    term.onData((data) => {
      if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'terminal_data', data }));
    });
    new ResizeObserver(() => {
      fit.fit();
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'terminal_resize', cols: term.cols, rows: term.rows }));
      }
    }).observe(document.getElementById('term'));
  </script>
</body>
</html>
