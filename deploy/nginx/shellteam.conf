# ShellTeam cloud-computer file server (native edition).
#
# Self-contained nginx config run as a systemd --user service:
#   nginx -c deploy/nginx/shellteam.conf
# install.sh substitutes the @TOKENS@ (paths) before installing.
#
# Serves the owner's $HOME on the FILE_PORT (default 80) with dotfiles blocked.
# The control plane (subdomain proxy) forwards owner-subdomain requests here
# after authorizing. install.sh substitutes @FILE_PORT@ from .env.

worker_processes  1;
daemon            on;
pid               @STATE@/nginx.pid;
error_log         @STATE@/nginx-error.log warn;

events {
    worker_connections  1024;
}

http {
    include       @MIME@;
    default_type  application/octet-stream;
    access_log    @STATE@/nginx-access.log;

    client_body_temp_path @STATE@/body;
    proxy_temp_path       @STATE@/proxy;
    fastcgi_temp_path     @STATE@/fastcgi;
    uwsgi_temp_path       @STATE@/uwsgi;
    scgi_temp_path        @STATE@/scgi;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 200M;

    server {
        # Loopback only. The file server has no auth of its own — it is always
        # reached through the FastAPI subdomain proxy (which targets 127.0.0.1)
        # or, for a public deploy, fronted by Caddy over localhost. Never bind it
        # to a public interface directly.
        listen 127.0.0.1:@FILE_PORT@ default_server;
        listen [::1]:@FILE_PORT@ default_server;
        root @HOME@;
        index index.html;

        # Never follow symlinks the owner didn't create over their own files:
        # without this, anything that drops `~/public/x -> /home/user/.ssh`
        # serves the target to the internet — the dotfile deny below only
        # inspects the REQUEST path, not the symlink target.
        disable_symlinks if_not_owner;

        # Block dotfiles/dirs — .env, .ssh, .git, .claude, .bashrc, etc.
        # Never served regardless of auth.
        location ~ /\. {
            deny all;
        }

        # Public folder — anything here is intentionally world-readable.
        location ^~ /public/ {
            alias @HOME@/public/;
            autoindex off;
        }

        # Files tab — browse $HOME (the dashboard frames `<owner>.<domain>/_files/`).
        # Owner-only: reached solely through the token-gated FastAPI subdomain proxy.
        # PLAIN prefix (NOT `^~`): `^~` would suppress regex-location checking and
        # expose dotfiles. With a plain prefix the `location ~ /\.` deny above still
        # fires for any path containing `/.`, so .env/.ssh/.git stay blocked.
        location /_files/ {
            alias @HOME@/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # In-dashboard file editor (Monaco SPA, served static from $STATE). The
        # editor reads file contents from `/<path>` (the root block below), lists
        # directories via /_ls/ (JSON), and saves through /_api/ (proxied to the
        # cockpit). Deep links (/_editor/<path>?line=N) fall back to the SPA shell.
        location = /_editor { return 301 /_editor/; }
        location ^~ /_editor/ {
            alias @STATE@/file-editor/;
            index index.html;
            try_files $uri /_editor/index.html;
            # Always revalidate (cheap ETag 304s). Without this, heuristic
            # caching kept serving stale copies of the SPA after deploys —
            # editor fixes appeared to "not take" (SHE-60).
            add_header Cache-Control "no-cache";
        }

        # File API for the editor (write/mkdir/rename/delete/upload/zip). Proxied
        # to the cockpit, which only accepts calls carrying X-Forwarded-By: nginx —
        # so these endpoints are reachable solely through this owner-only path.
        location ^~ /_api/ {
            proxy_pass http://127.0.0.1:@AI_CHAT_PORT@;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-By nginx;
            client_max_body_size 200M;
        }

        # JSON directory listings for the editor's file tree. PLAIN prefix (NOT
        # `^~`) so the `location ~ /\.` deny still hides dotfile dirs from listings.
        location /_ls/ {
            alias @HOME@/;
            # Never serve a directory's own index.html here — a project dir like
            # ~/homefinder (a web app) would otherwise return its index.html and
            # the editor's fetch('/_ls/…').json() would choke on "<!DOCTYPE html>".
            # A sentinel index name that never exists forces the JSON autoindex.
            index _disabled;
            autoindex on;
            autoindex_format json;
            # A listing is dynamic — never let a browser heuristically cache a
            # stale tree (or the pre-fix HTML response).
            add_header Cache-Control "no-store" always;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
